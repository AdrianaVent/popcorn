name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Type check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Set build env
        run: |
          TMDB_KEY="${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}"
          JWT_VAL="${{ secrets.JWT_SECRET }}"
          echo "NEXT_PUBLIC_TMDB_API_KEY=${TMDB_KEY:-ci-placeholder}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${JWT_VAL:-ci-placeholder-secret-32-chars-long}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Cypress)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set env
        run: |
          TMDB_KEY="${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}"
          JWT_VAL="${{ secrets.JWT_SECRET }}"
          echo "NEXT_PUBLIC_TMDB_API_KEY=${TMDB_KEY:-ci-placeholder}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${JWT_VAL:-ci-placeholder-secret-32-chars-long}" >> "$GITHUB_ENV"

      - name: Create data directory
        run: mkdir -p data

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: [check, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version and lowercase repo
        id: pkg
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.pkg.outputs.repo }}:latest
            ghcr.io/${{ steps.pkg.outputs.repo }}:${{ steps.pkg.outputs.version }}
          build-args: |
            NEXT_PUBLIC_TMDB_API_KEY=${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
