name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - dev
      - main

jobs:
  check:
    name: Type check, lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Set build env
        run: |
          TMDB_KEY="${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}"
          JWT_VAL="${{ secrets.JWT_SECRET }}"
          echo "NEXT_PUBLIC_TMDB_API_KEY=${TMDB_KEY:-ci-placeholder}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${JWT_VAL:-ci-placeholder-secret-32-chars-long}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Cypress)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set env
        run: |
          TMDB_KEY="${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}"
          JWT_VAL="${{ secrets.JWT_SECRET }}"
          echo "NEXT_PUBLIC_TMDB_API_KEY=${TMDB_KEY:-ci-placeholder}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${JWT_VAL:-ci-placeholder-secret-32-chars-long}" >> "$GITHUB_ENV"

      - name: Create data directory
        run: mkdir -p data

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
