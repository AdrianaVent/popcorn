services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_TMDB_API_KEY: ${NEXT_PUBLIC_TMDB_API_KEY}
    env_file:
      - .env.local
    ports:
      - '3000:3000'
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    volumes:
      - popcorn_data:/app/data

volumes:
  popcorn_data:
